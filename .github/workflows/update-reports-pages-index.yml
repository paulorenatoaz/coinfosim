name: Update gh-pages index
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  update-index:
    runs-on: ubuntu-latest
    env:
      PAGES_BRANCH: gh-pages
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch Pages branch and add worktree
        run: |
          git fetch origin "$PAGES_BRANCH:$PAGES_BRANCH" || true
          git worktree add reports-pages "$PAGES_BRANCH"

      - name: Generate index for Pages branch
        run: |
          python -m pip install --upgrade pip
          PYTHONPATH=src python -m coinfosim.publish.publisher --reports-dir reports --data-dir data --site-dir reports-pages --title "CoInfoSim - Published Research Reports"
          cd reports-pages
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(publish): update index [skip ci]"
            git push origin "HEAD:$PAGES_BRANCH"
          fi

      - name: Cleanup worktree
        if: always()
        run: git worktree remove reports-pages --force || true
