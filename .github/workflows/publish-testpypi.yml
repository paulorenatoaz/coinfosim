name: Publish to TestPyPI

# Manual, explicit release step. Uses PyPI Trusted Publishing (OIDC): no
# stored API token exists anywhere in this repository or its secrets.
#
# One-time external setup required on https://test.pypi.org (owner action,
# cannot be performed by this workflow or by an agent):
#   Organization/owner: paulorenatoaz
#   Repository:          coinfosim
#   Workflow filename:   publish-testpypi.yml
#   Environment name:    testpypi
#   Project name:        coinfosim

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*.*a*"
      - "v*.*.*b*"
      - "v*.*.*rc*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: twine check
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coinfosim-testpypi-dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/coinfosim
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: coinfosim-testpypi-dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
